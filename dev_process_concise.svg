<text x="154" y="725" text-anchor="middle" font-size="9" fill="#9a3412">branch: area-1-engine</text>

<rect x="306" y="602" width="248" height="130" rx="9" fill="#fff7ed" stroke="#f97316" stroke-width="1" stroke-dasharray="5 3"/>
<text x="430" y="619" text-anchor="middle" font-size="9" fill="#c2410c" font-weight="700" letter-spacing="1">HARNESS · P3 · Claude Code</text>
<rect x="322" y="625" width="216" height="24" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="430" y="642" text-anchor="middle" font-size="10" fill="#374151">mock_play_game() · no engine dep</text>
<rect x="322" y="655" width="216" height="24" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="430" y="672" text-anchor="middle" font-size="10" fill="#374151">Tournament + leaderboard</text>
<rect x="322" y="685" width="216" height="24" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="430" y="702" text-anchor="middle" font-size="10" fill="#374151">Marginals + synergy + CLI</text>
<rect x="322" y="715" width="216" height="12" rx="3" fill="#fed7aa" stroke="none"/>
<text x="430" y="725" text-anchor="middle" font-size="9" fill="#9a3412">branch: area-2-harness</text>

<rect x="582" y="602" width="248" height="130" rx="9" fill="#fff7ed" stroke="#f97316" stroke-width="1" stroke-dasharray="5 3"/>
<text x="706" y="619" text-anchor="middle" font-size="9" fill="#c2410c" font-weight="700" letter-spacing="1">UI · P4–5 · Streamlit</text>
<rect x="598" y="625" width="216" height="24" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="706" y="642" text-anchor="middle" font-size="10" fill="#374151">Sidebar + charts + heatmap</text>
<rect x="598" y="655" width="216" height="24" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="706" y="672" text-anchor="middle" font-size="10" fill="#374151">Board view · 5-page app</text>
<rect x="598" y="685" width="216" height="24" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="706" y="702" text-anchor="middle" font-size="10" fill="#374151">Mock data during dev</text>
<rect x="598" y="715" width="216" height="12" rx="3" fill="#fed7aa" stroke="none"/>
<text x="706" y="725" text-anchor="middle" font-size="9" fill="#9a3412">branch: ui-streamlit</text>

<text x="430" y="750" text-anchor="middle" font-size="10" fill="#9ca3af">CI on every push · Area 2 uses mock — zero dependency on Area 1 · testers run pipeline while devs build in parallel</text>

<!-- ── 6. INTEGRATION ── -->
<path d="M 154 732 L 310 768" fill="none" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
