<svg xmlns="http://www.w3.org/2000/svg" width="860" viewBox="0 0 860 1000" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
<title>EngineLab development process</title>
<rect width="860" height="1000" fill="#ffffff"/>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-grn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ── 1. IDEATION ── -->
<text x="430" y="20" text-anchor="middle" font-size="9" fill="#9ca3af" letter-spacing="2" font-weight="600">1 · IDEATION</text>
<rect x="255" y="28" width="350" height="44" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
<text x="430" y="46" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">Any chess variant</text>
<text x="430" y="63" text-anchor="middle" font-size="11" fill="#5b21b6">→ build an engine for it quickly, without training</text>

<!-- ── 2. LLM COUNCIL ── -->
<line x1="430" y1="72" x2="430" y2="92" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
<text x="430" y="107" text-anchor="middle" font-size="9" fill="#9ca3af" letter-spacing="2" font-weight="600">2 · LLM STRATEGY COUNCIL</text>

<rect x="30" y="114" width="800" height="136" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" stroke-dasharray="6 3"/>

<!-- 5 LLMs with subtitles -->
<rect x="46"  y="128" width="128" height="46" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
<text x="110" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#064e3b">Claude</text>
<text x="110" y="165" text-anchor="middle" font-size="10" fill="#065f46">synthesis</text>

<rect x="184" y="128" width="128" height="46" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
<text x="248" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#064e3b">GPT-4o</text>
<text x="248" y="165" text-anchor="middle" font-size="10" fill="#065f46">architecture</text>

<rect x="322" y="128" width="128" height="46" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
<text x="386" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#064e3b">Gemini</text>
<text x="386" y="165" text-anchor="middle" font-size="10" fill="#065f46">literature</text>

<rect x="460" y="128" width="128" height="46" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
<text x="524" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#064e3b">DeepSeek</text>
<text x="524" y="165" text-anchor="middle" font-size="10" fill="#065f46">adversarial</text>

<rect x="598" y="128" width="128" height="46" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
<text x="662" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#064e3b">Perplexity</text>
<text x="662" y="165" text-anchor="middle" font-size="10" fill="#065f46">research</text>

<!-- Process + verdict side by side -->
<rect x="46" y="186" width="360" height="50" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
<text x="226" y="207" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">propose → critique → synthesise</text>
<text x="226" y="224" text-anchor="middle" font-size="10" fill="#9ca3af">3 rounds max · adversarial prompting</text>

<rect x="420" y="186" width="360" height="50" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
<text x="600" y="207" text-anchor="middle" font-size="11" font-weight="700" fill="#78350f">verdict: alpha-beta search</text>
<text x="600" y="224" text-anchor="middle" font-size="10" fill="#92400e">neural nets off the table · proven pre-ML</text>

<!-- ── 3. FEATURE SELECTION ── -->
<line x1="430" y1="250" x2="430" y2="270" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
<text x="430" y="285" text-anchor="middle" font-size="9" fill="#9ca3af" letter-spacing="2" font-weight="600">3 · FEATURE SELECTION</text>

<!-- 3 options -->
<rect x="30"  y="292" width="234" height="68" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
<text x="147" y="315" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Exhaustive</text>
<text x="147" y="333" text-anchor="middle" font-size="11" fill="#991b1b">2¹⁰ – 1 = 1,023 agents</text>
<text x="147" y="350" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">✕  infeasible</text>

<rect x="313" y="292" width="234" height="68" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
<text x="430" y="315" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Random sample</text>
<text x="430" y="333" text-anchor="middle" font-size="11" fill="#991b1b">~100 subsets</text>
<text x="430" y="350" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">✕  non-deterministic</text>

<rect x="596" y="292" width="234" height="68" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="713" y="313" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">Choose 7 directly  ✓</text>
<text x="713" y="331" text-anchor="middle" font-size="11" fill="#166534">2⁷ – 1 = 127 agents</text>
<text x="713" y="349" text-anchor="middle" font-size="10" fill="#166534">exhaustive · deterministic</text>

<path d="M 713 360 L 713 384 L 430 384" fill="none" stroke="#16a34a" stroke-width="1"/>
<line x1="430" y1="384" x2="430" y2="396" stroke="#16a34a" stroke-width="1" marker-end="url(#arr-grn)"/>
<rect x="215" y="398" width="430" height="28" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
<text x="430" y="417" text-anchor="middle" font-size="11" fill="#166534">7 features · 127 agents · fully exhaustive · deterministic</text>

<!-- ── 4. SPEC ── -->
<line x1="430" y1="426" x2="430" y2="444" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
<text x="430" y="459" text-anchor="middle" font-size="9" fill="#9ca3af" letter-spacing="2" font-weight="600">4 · SPEC SPRINT</text>

<rect x="30" y="466" width="800" height="36" rx="7" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" stroke-dasharray="6 3"/>
<text x="190" y="480" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Interfaces locked</text>
<text x="190" y="495" text-anchor="middle" font-size="10" fill="#9ca3af">Board · Move · GameResult</text>
<line x1="370" y1="472" x2="370" y2="496" stroke="#e5e7eb" stroke-width="1"/>
<text x="430" y="480" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Ownership map</text>
<text x="430" y="495" text-anchor="middle" font-size="10" fill="#9ca3af">Foundation → Engine → Harness</text>
<line x1="490" y1="472" x2="490" y2="496" stroke="#e5e7eb" stroke-width="1"/>
<text x="660" y="480" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Pipeline</text>
<text x="660" y="495" text-anchor="middle" font-size="10" fill="#9ca3af">features → agents → tournament → analysis → report</text>

<!-- ── 5. PARALLEL EXECUTION ── -->
<line x1="430" y1="502" x2="430" y2="520" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
<text x="430" y="535" text-anchor="middle" font-size="9" fill="#9ca3af" letter-spacing="2" font-weight="600">5 · PARALLEL EXECUTION</text>

<!-- Foundation -->
<rect x="30" y="542" width="800" height="34" rx="7" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
<text x="430" y="556" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Foundation — Person 1 → main</text>
<text x="430" y="570" text-anchor="middle" font-size="10" fill="#6b7280">Board · Move · move gen · castling · en passant · check detection · stubs</text>

<!-- branch lines -->
<path d="M 190 576 L 150 600" fill="none" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
<line x1="430" y1="576" x2="430" y2="600" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
<path d="M 670 576 L 710 600" fill="none" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>

<!-- Three tracks -->
<rect x="30"  y="602" width="248" height="130" rx="9" fill="#fff7ed" stroke="#f97316" stroke-width="1" stroke-dasharray="5 3"/>
<text x="154" y="619" text-anchor="middle" font-size="9" fill="#c2410c" font-weight="700" letter-spacing="1">ENGINE · P2 · Claude Code</text>
