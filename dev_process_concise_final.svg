<text x="430" y="752" text-anchor="middle" font-size="9" fill="#9ca3af" letter-spacing="2" font-weight="600">6 · INTEGRATION</text>

<rect x="30" y="760" width="800" height="34" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="430" y="774" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">Merge · swap mock → play_game · all tests pass</text>
<text x="430" y="788" text-anchor="middle" font-size="10" fill="#166534">127 agents · 16,002 games · multiprocessing · deterministic (seed per game)</text>

