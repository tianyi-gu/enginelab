<svg xmlns="http://www.w3.org/2000/svg" width="860" viewBox="0 0 860 950" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
<title>EngineLab development process</title>
<rect width="860" height="950" fill="#ffffff"/>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-grn" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ── 1. IDEATION ── -->
<text x="430" y="20" text-anchor="middle" font-size="9" fill="#9ca3af" letter-spacing="2" font-weight="600">1 · IDEATION</text>
<rect x="255" y="28" width="350" height="44" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
<text x="430" y="46" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">Any chess variant</text>
<text x="430" y="63" text-anchor="middle" font-size="11" fill="#5b21b6">→ build an engine for it quickly, without training</text>

<!-- ── 2. LLM COUNCIL ── -->
<line x1="430" y1="72" x2="430" y2="92" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
<text x="430" y="107" text-anchor="middle" font-size="9" fill="#9ca3af" letter-spacing="2" font-weight="600">2 · LLM STRATEGY COUNCIL</text>

<rect x="30" y="114" width="800" height="124" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" stroke-dasharray="6 3"/>

<!-- 4 LLMs, no subtitles, evenly spaced: w=152 gap=18, total=4×152+3×18=662, start x=99 -->
<rect x="99"  y="128" width="152" height="34" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
<text x="175" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#064e3b">Claude</text>

<rect x="269" y="128" width="152" height="34" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
<text x="345" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#064e3b">GPT-4o</text>

<rect x="439" y="128" width="152" height="34" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
<text x="515" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#064e3b">Gemini</text>

<rect x="609" y="128" width="152" height="34" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
<text x="685" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#064e3b">Perplexity</text>

<!-- Process + verdict side by side -->
<rect x="46" y="174" width="360" height="50" rx="6" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
<text x="226" y="195" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">propose → critique → synthesise</text>
<text x="226" y="212" text-anchor="middle" font-size="10" fill="#9ca3af">3 rounds max · adversarial prompting</text>

<rect x="420" y="174" width="360" height="50" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
<text x="600" y="195" text-anchor="middle" font-size="11" font-weight="700" fill="#78350f">verdict: alpha-beta search</text>
<text x="600" y="212" text-anchor="middle" font-size="10" fill="#92400e">neural nets off the table · proven pre-ML</text>

<!-- ── 3. FEATURE SELECTION ── -->
<line x1="430" y1="238" x2="430" y2="258" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
<text x="430" y="273" text-anchor="middle" font-size="9" fill="#9ca3af" letter-spacing="2" font-weight="600">3 · FEATURE SELECTION</text>

<!-- 3 options -->
<rect x="30"  y="280" width="234" height="68" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
<text x="147" y="303" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Exhaustive</text>
<text x="147" y="321" text-anchor="middle" font-size="11" fill="#991b1b">2¹⁰ – 1 = 1,023 agents</text>
<text x="147" y="338" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">✕  infeasible</text>

<rect x="313" y="280" width="234" height="68" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
<text x="430" y="303" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Random sample</text>
<text x="430" y="321" text-anchor="middle" font-size="11" fill="#991b1b">~100 subsets</text>
<text x="430" y="338" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">✕  non-deterministic</text>

<rect x="596" y="280" width="234" height="68" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
<text x="713" y="301" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">Choose 7 directly  ✓</text>
<text x="713" y="319" text-anchor="middle" font-size="11" fill="#166534">2⁷ – 1 = 127 agents</text>
<text x="713" y="337" text-anchor="middle" font-size="10" fill="#166534">exhaustive · deterministic</text>

<path d="M 713 348 L 713 372 L 430 372" fill="none" stroke="#16a34a" stroke-width="1"/>
<line x1="430" y1="372" x2="430" y2="384" stroke="#16a34a" stroke-width="1" marker-end="url(#arr-grn)"/>
<rect x="215" y="386" width="430" height="28" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
<text x="430" y="405" text-anchor="middle" font-size="11" fill="#166534">7 features · 127 agents · reasonably comprehensive · deterministic</text>

<!-- ── 4. SPEC ── -->
<line x1="430" y1="414" x2="430" y2="432" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
<text x="430" y="447" text-anchor="middle" font-size="9" fill="#9ca3af" letter-spacing="2" font-weight="600">4 · SPEC SPRINT</text>

<rect x="30" y="454" width="800" height="36" rx="7" fill="#f9fafb" stroke="#d1d5db" stroke-width="1" stroke-dasharray="6 3"/>
<text x="190" y="468" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Interfaces locked</text>
<text x="190" y="483" text-anchor="middle" font-size="10" fill="#9ca3af">Board · Move · GameResult</text>
<line x1="370" y1="460" x2="370" y2="484" stroke="#e5e7eb" stroke-width="1"/>
<text x="430" y="468" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Ownership map</text>
<text x="430" y="483" text-anchor="middle" font-size="10" fill="#9ca3af">Foundation → Engine → Harness</text>
<line x1="490" y1="460" x2="490" y2="484" stroke="#e5e7eb" stroke-width="1"/>
<text x="660" y="468" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Pipeline</text>
<text x="660" y="483" text-anchor="middle" font-size="10" fill="#9ca3af">features → agents → tournament → analysis → report</text>

<!-- ── 5. PARALLEL EXECUTION ── -->
<line x1="430" y1="490" x2="430" y2="508" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
<text x="430" y="523" text-anchor="middle" font-size="9" fill="#9ca3af" letter-spacing="2" font-weight="600">5 · PARALLEL EXECUTION</text>

<!-- Foundation -->
<rect x="30" y="530" width="800" height="34" rx="7" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
<text x="430" y="544" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Foundation — Person 1 → main</text>
<text x="430" y="558" text-anchor="middle" font-size="10" fill="#6b7280">Board · Move · move gen · castling · en passant · check detection · stubs</text>

<!-- branch lines -->
<path d="M 190 564 L 150 588" fill="none" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
<line x1="430" y1="564" x2="430" y2="588" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
<path d="M 670 564 L 710 588" fill="none" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>

<!-- Three tracks -->
<rect x="30"  y="590" width="248" height="130" rx="9" fill="#fff7ed" stroke="#f97316" stroke-width="1" stroke-dasharray="5 3"/>
<text x="154" y="607" text-anchor="middle" font-size="9" fill="#c2410c" font-weight="700" letter-spacing="1">ENGINE · P2 · Claude Code</text>
<rect x="46"  y="613" width="216" height="24" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="154" y="630" text-anchor="middle" font-size="10" fill="#374151">Atomic + antichess variants</text>
<rect x="46"  y="643" width="216" height="24" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="154" y="660" text-anchor="middle" font-size="10" fill="#374151">7 features · 127 agents</text>
<rect x="46"  y="673" width="216" height="24" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="154" y="690" text-anchor="middle" font-size="10" fill="#374151">Alpha-beta search</text>
<rect x="46"  y="703" width="216" height="12" rx="3" fill="#fed7aa" stroke="none"/>
<text x="154" y="713" text-anchor="middle" font-size="9" fill="#9a3412">branch: area-1-engine</text>

<rect x="306" y="590" width="248" height="130" rx="9" fill="#fff7ed" stroke="#f97316" stroke-width="1" stroke-dasharray="5 3"/>
<text x="430" y="607" text-anchor="middle" font-size="9" fill="#c2410c" font-weight="700" letter-spacing="1">HARNESS · P3 · Claude Code</text>
<rect x="322" y="613" width="216" height="24" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="430" y="630" text-anchor="middle" font-size="10" fill="#374151">mock_play_game() · no engine dep</text>
<rect x="322" y="643" width="216" height="24" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="430" y="660" text-anchor="middle" font-size="10" fill="#374151">Tournament + leaderboard</text>
<rect x="322" y="673" width="216" height="24" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="430" y="690" text-anchor="middle" font-size="10" fill="#374151">Marginals + synergy + CLI</text>
<rect x="322" y="703" width="216" height="12" rx="3" fill="#fed7aa" stroke="none"/>
<text x="430" y="713" text-anchor="middle" font-size="9" fill="#9a3412">branch: area-2-harness</text>

<rect x="582" y="590" width="248" height="130" rx="9" fill="#fff7ed" stroke="#f97316" stroke-width="1" stroke-dasharray="5 3"/>
<text x="706" y="607" text-anchor="middle" font-size="9" fill="#c2410c" font-weight="700" letter-spacing="1">UI · P4–5 · Streamlit</text>
<rect x="598" y="613" width="216" height="24" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="706" y="630" text-anchor="middle" font-size="10" fill="#374151">Sidebar + charts + heatmap</text>
<rect x="598" y="643" width="216" height="24" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="706" y="660" text-anchor="middle" font-size="10" fill="#374151">Board view · 5-page app</text>
<rect x="598" y="673" width="216" height="24" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
<text x="706" y="690" text-anchor="middle" font-size="10" fill="#374151">Mock data during dev</text>
<rect x="598" y="703" width="216" height="12" rx="3" fill="#fed7aa" stroke="none"/>
<text x="706" y="713" text-anchor="middle" font-size="9" fill="#9a3412">branch: ui-streamlit</text>

<text x="430" y="738" text-anchor="middle" font-size="10" fill="#9ca3af">CI on every push · Area 2 uses mock — zero dependency on Area 1 · testers run pipeline while devs build in parallel</text>

<!-- ── 6. INTEGRATION ── -->
<path d="M 154 720 L 310 756" fill="none" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
<line x1="430" y1="720" x2="430" y2="756" stroke="#9ca3af" stroke-width="1" marker-end="url(#arr)"/>
